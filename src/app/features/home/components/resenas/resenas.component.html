<section
  id="resenas"
  class="py-24 bg-quevedo-surface"
  aria-labelledby="resenas-titulo">

  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">

    <!-- Encabezado -->
    <div class="text-center mb-14" appScrollReveal>
      <p class="text-quevedo-gold text-[0.65rem] font-semibold tracking-[0.4em] uppercase mb-3">
        Lo que dicen nuestros clientes
      </p>
      <h2 id="resenas-titulo" class="text-quevedo-text font-black text-5xl sm:text-6xl tracking-tight">
        Reseñas
      </h2>
      <div class="flex items-center justify-center gap-3 mt-6" aria-hidden="true">
        <div class="h-px w-16 bg-gradient-to-r from-transparent to-quevedo-red/50"></div>
        <div class="w-[6px] h-[6px] rotate-45 bg-quevedo-red flex-shrink-0"></div>
        <div class="h-px w-16 bg-gradient-to-l from-transparent to-quevedo-red/50"></div>
      </div>
    </div>

    <!-- Cards -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      @for (r of resenas; track r.nombre; let i = $index) {
        <article
          appScrollReveal
          [style.transition-delay]="i * 0.12 + 's'"
          class="flex flex-col gap-5 p-8 bg-quevedo-bg rounded-2xl border border-quevedo-surface-light/50 hover:border-quevedo-red/15 transition-colors duration-300"
          [attr.aria-label]="'Reseña de ' + r.nombre">

          <!-- Estrellas -->
          <div class="flex items-center gap-1" aria-label="5 estrellas">
            @for (i of starRange; track i) {
              <svg
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 20 20"
                fill="currentColor"
                class="w-4 h-4 transition-colors"
                [class.text-quevedo-gold]="i <= r.estrellas"
                [class.text-quevedo-muted]="i > r.estrellas"
                aria-hidden="true">
                <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z" />
              </svg>
            }
          </div>

          <!-- Texto -->
          <blockquote class="text-quevedo-muted text-base leading-relaxed flex-1">
            "{{ r.texto }}"
          </blockquote>

          <!-- Autor -->
          <footer class="flex items-center gap-4 pt-2 border-t border-quevedo-surface-light/50">
            <div
              class="w-10 h-10 rounded-full bg-quevedo-surface-light flex items-center justify-center text-quevedo-text text-xs font-bold tracking-wide flex-shrink-0"
              aria-hidden="true">
              {{ r.iniciales }}
            </div>
            <div>
              <p class="text-quevedo-text font-semibold text-sm">{{ r.nombre }}</p>
              <p class="text-quevedo-muted text-xs">{{ r.fecha }}</p>
            </div>
          </footer>

        </article>
      }
    </div>

  </div>
</section>
