<section
  id="ubicacion"
  class="py-24 bg-quevedo-bg"
  aria-labelledby="ubicacion-titulo">

  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">

    <!-- Encabezado -->
    <div class="text-center mb-14" appScrollReveal>
      <p class="text-quevedo-gold text-[0.65rem] font-semibold tracking-[0.4em] uppercase mb-3">
        Cómo llegar
      </p>
      <h2 id="ubicacion-titulo" class="text-quevedo-text font-black text-5xl sm:text-6xl tracking-tight">
        Ubicación
      </h2>
      <div class="flex items-center justify-center gap-3 mt-6" aria-hidden="true">
        <div class="h-px w-16 bg-gradient-to-r from-transparent to-quevedo-red/50"></div>
        <div class="w-[6px] h-[6px] rotate-45 bg-quevedo-red flex-shrink-0"></div>
        <div class="h-px w-16 bg-gradient-to-l from-transparent to-quevedo-red/50"></div>
      </div>
    </div>

    <!-- Mapa + Panel de información -->
    <div
      appScrollReveal
      [style.transition-delay]="'0.1s'"
      class="grid grid-cols-1 lg:grid-cols-5 rounded-2xl overflow-hidden border border-quevedo-surface-light/50">

      <!-- ── Mapa ── -->
      <div class="lg:col-span-3 h-[360px] lg:h-[500px]">
        <iframe
          src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3283.9963239143025!2d-58.37358068468011!3d-34.60832238045654!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x95a3352bbe7e8d97%3A0xe68aa5c7be3a6cf4!2sPlaza%20de%20Mayo%2C%20Buenos%20Aires%2C%20Argentina!5e0!3m2!1ses!2sar!4v1700000000000!5m2!1ses!2sar"
          width="100%"
          height="100%"
          style="border:0; display:block;"
          allowfullscreen
          loading="lazy"
          referrerpolicy="no-referrer-when-downgrade"
          title="Ubicación de Pizzería Quevedo, Plaza de Mayo, Buenos Aires">
        </iframe>
      </div>

      <!-- ── Panel de información ── -->
      <div class="lg:col-span-2 bg-quevedo-surface p-8 lg:p-10 flex flex-col justify-center gap-8">

        <!-- Dirección -->
        <div class="space-y-2">
          <h3 class="text-quevedo-gold text-[0.65rem] font-semibold tracking-[0.3em] uppercase">
            Dirección
          </h3>
          <address class="not-italic space-y-0.5">
            <p class="text-quevedo-text font-semibold text-base">Thames 1847</p>
            <p class="text-quevedo-muted text-sm">Palermo Hollywood, CABA</p>
            <p class="text-quevedo-muted text-sm">Buenos Aires, Argentina</p>
          </address>
        </div>

        <!-- Separador -->
        <div class="h-px bg-quevedo-surface-light/60" aria-hidden="true"></div>

        <!-- Horarios -->
        <div class="space-y-4">
          <h3 class="text-quevedo-gold text-[0.65rem] font-semibold tracking-[0.3em] uppercase">
            Horarios
          </h3>
          <dl class="space-y-0">
            @for (h of horarios; track h.dias) {
              <div class="flex items-baseline justify-between gap-4 py-2.5 border-b border-quevedo-surface-light/40 last:border-0">
                <dt class="text-quevedo-muted text-sm flex-shrink-0">{{ h.dias }}</dt>
                <dd
                  class="text-sm font-medium text-right"
                  [class.text-quevedo-text]="!h.cerrado"
                  [class.text-quevedo-muted]="h.cerrado"
                  [class.italic]="h.cerrado">
                  {{ h.horas }}
                </dd>
              </div>
            }
          </dl>
        </div>

        <!-- Separador -->
        <div class="h-px bg-quevedo-surface-light/60" aria-hidden="true"></div>

        <!-- CTA -->
        <a
          href="https://wa.me/5491100000000"
          target="_blank"
          rel="noopener noreferrer"
          class="inline-flex items-center justify-center gap-2.5 px-6 py-3.5 bg-quevedo-red text-quevedo-text text-xs font-semibold tracking-[0.15em] uppercase rounded hover:bg-red-500 active:scale-95 transition-all duration-200 shadow-lg shadow-quevedo-red/20 focus-visible:outline-2 focus-visible:outline-quevedo-gold focus-visible:outline-offset-2">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-4 h-4 flex-shrink-0" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 6.75c0 8.284 6.716 15 15 15h2.25a2.25 2.25 0 0 0 2.25-2.25v-1.372c0-.516-.351-.966-.852-1.091l-4.423-1.106c-.44-.11-.902.055-1.173.417l-.97 1.293c-.282.376-.769.542-1.21.38a12.035 12.035 0 0 1-7.143-7.143c-.162-.441.004-.928.38-1.21l1.293-.97c.363-.271.527-.734.417-1.173L6.963 3.102a1.125 1.125 0 0 0-1.091-.852H4.5A2.25 2.25 0 0 0 2.25 4.5v2.25Z" />
          </svg>
          Consultar disponibilidad
        </a>

      </div>
    </div>

  </div>
</section>
