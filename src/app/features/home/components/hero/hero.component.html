<section
  id="hero"
  class="relative min-h-screen flex flex-col items-center justify-center overflow-hidden bg-quevedo-bg"
  aria-labelledby="hero-title">

  <div class="absolute -top-32 -right-32 w-[700px] h-[700px] rounded-full bg-quevedo-red/[0.07] blur-[130px]" aria-hidden="true"></div>
  <div class="absolute -bottom-48 -left-48 w-[600px] h-[600px] rounded-full bg-quevedo-gold/[0.06] blur-[110px]" aria-hidden="true"></div>
  <div class="absolute bottom-0 right-1/4 w-[400px] h-[400px] rounded-full bg-quevedo-red/[0.04] blur-[90px]" aria-hidden="true"></div>

  <div
    class="absolute inset-0 [background-image:linear-gradient(rgba(241,241,241,0.03)_1px,transparent_1px),linear-gradient(90deg,rgba(241,241,241,0.03)_1px,transparent_1px)] [background-size:60px_60px]"
    aria-hidden="true">
  </div>
  <div class="absolute inset-0 bg-[radial-gradient(ellipse_70%_80%_at_50%_50%,transparent_40%,#0A0A0A_100%)]" aria-hidden="true"></div>
  <div class="absolute bottom-0 inset-x-0 h-48 bg-gradient-to-t from-quevedo-bg to-transparent" aria-hidden="true"></div>

  <div class="relative z-10 text-center px-6 sm:px-10 max-w-5xl mx-auto">

    <p class="anim-1 text-quevedo-gold text-[0.65rem] sm:text-xs font-semibold tracking-[0.4em] uppercase mb-8">
      Buenos Aires &nbsp;&bull;&nbsp; Masa Madre &nbsp;&bull;&nbsp; Horno a Leña
    </p>

    <h1 id="hero-title" class="anim-2">
      <span class="block font-extralight text-quevedo-muted/70 text-3xl sm:text-4xl md:text-5xl tracking-[0.2em] uppercase mb-2">
        Pizzería
      </span>
      <span
        class="block font-black leading-none tracking-tight text-quevedo-text"
        style="font-size: clamp(4.5rem, 15vw, 11rem);">
        QUEVEDO
      </span>
    </h1>

    <div class="anim-3 flex items-center justify-center gap-4 my-9" aria-hidden="true">
      <div class="h-px w-24 bg-gradient-to-r from-transparent to-quevedo-red/70"></div>
      <div class="w-[7px] h-[7px] rotate-45 bg-quevedo-red flex-shrink-0"></div>
      <div class="h-px w-24 bg-gradient-to-l from-transparent to-quevedo-red/70"></div>
    </div>

    <p class="anim-3 text-quevedo-muted text-xl sm:text-2xl md:text-3xl font-light max-w-md mx-auto leading-snug">
      La pizza que<br>
      <span class="text-quevedo-text font-normal italic">no se olvida.</span>
    </p>

    <div class="anim-4 mt-12 flex flex-col sm:flex-row items-center justify-center gap-5">
      <a
        href="#menu"
        class="group inline-flex items-center gap-3 px-9 py-4 bg-quevedo-red text-quevedo-text font-semibold text-xs tracking-[0.2em] uppercase rounded hover:bg-red-500 active:scale-95 transition-all duration-200 shadow-xl shadow-quevedo-red/20 focus-visible:outline-2 focus-visible:outline-quevedo-gold focus-visible:outline-offset-2">
        Ver el menú
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor"
             class="w-4 h-4 transition-transform duration-200 group-hover:translate-y-0.5" aria-hidden="true">
          <path fill-rule="evenodd" d="M10 3a.75.75 0 01.75.75v10.638l3.96-4.158a.75.75 0 111.08 1.04l-5.25 5.5a.75.75 0 01-1.08 0l-5.25-5.5a.75.75 0 111.08-1.04l3.96 4.158V3.75A.75.75 0 0110 3z" clip-rule="evenodd" />
        </svg>
      </a>
      <a
        href="#nosotros"
        class="text-quevedo-muted/70 text-sm hover:text-quevedo-text transition-colors duration-200 focus-visible:outline-2 focus-visible:outline-quevedo-red focus-visible:outline-offset-2 rounded-sm">
        Conocé nuestra historia &rarr;
      </a>
    </div>
  </div>

  <div class="anim-5 absolute bottom-8 left-1/2 -translate-x-1/2 flex flex-col items-center gap-2" aria-hidden="true">
    <div class="w-px h-10 bg-gradient-to-b from-transparent to-quevedo-muted/30"></div>
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"
         class="w-4 h-4 text-quevedo-muted/30 animate-bounce">
      <path stroke-linecap="round" stroke-linejoin="round" d="m19.5 8.25-7.5 7.5-7.5-7.5" />
    </svg>
  </div>

</section>
