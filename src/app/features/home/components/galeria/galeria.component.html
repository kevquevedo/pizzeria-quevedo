<section
  id="galeria"
  class="py-24 bg-quevedo-bg"
  aria-labelledby="galeria-titulo">

  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">

    <!-- Encabezado -->
    <div class="text-center mb-14" appScrollReveal>
      <p class="text-quevedo-gold text-[0.65rem] font-semibold tracking-[0.4em] uppercase mb-3">
        Momentos y sabores
      </p>
      <h2 id="galeria-titulo" class="text-quevedo-text font-black text-5xl sm:text-6xl tracking-tight">
        Galería
      </h2>
      <div class="flex items-center justify-center gap-3 mt-6" aria-hidden="true">
        <div class="h-px w-16 bg-gradient-to-r from-transparent to-quevedo-red/50"></div>
        <div class="w-[6px] h-[6px] rotate-45 bg-quevedo-red flex-shrink-0"></div>
        <div class="h-px w-16 bg-gradient-to-l from-transparent to-quevedo-red/50"></div>
      </div>
    </div>

    <!-- Grid -->
    <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-3">
      @for (img of imagenes; track img.src; let i = $index) {
        <div
          appScrollReveal
          [style.transition-delay]="i * 0.06 + 's'"
          class="group aspect-square overflow-hidden rounded-xl bg-quevedo-surface relative">
          <img
            [src]="img.src"
            [alt]="img.alt"
            loading="lazy"
            class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500 ease-out">
          <div
            class="absolute inset-0 bg-quevedo-bg/0 group-hover:bg-quevedo-bg/30 transition-colors duration-300"
            aria-hidden="true">
          </div>
        </div>
      }
    </div>

  </div>
</section>
